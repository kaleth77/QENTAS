<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Dinero</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:500px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
text-align:center;
}

select,input,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#e0e0e0;
cursor:pointer;
}

button:hover{
background:#d0d0d0;
}

.movimientos{
text-align:left;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Control de Dinero</h2>

<select id="mes">
<option>Enero</option>
<option>Febrero</option>
<option>Marzo</option>
<option>Abril</option>
<option>Mayo</option>
<option>Junio</option>
<option>Julio</option>
<option>Agosto</option>
<option>Septiembre</option>
<option>Octubre</option>
<option>Noviembre</option>
<option>Diciembre</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="agregarProducido()">Agregar Producido</button>
<button onclick="agregarGasto()">Agregar Gasto</button>

<hr>

<h3>Total producido: $<span id="totalProducido">0</span></h3>
<h3>Total gastos: $<span id="totalGastos">0</span></h3>
<h2>Total final: $<span id="totalFinal">0</span></h2>

<hr>

<h3>Movimientos</h3>

<div id="movimientos" class="movimientos"></div>

</div>

<script>

let totalProducido = 0;
let totalGastos = 0;
let movimientos = [];

function formatearNumero(num){
return num.toLocaleString('es-CO');
}

function guardarDatos(){

localStorage.setItem("totalProducido", totalProducido);
localStorage.setItem("totalGastos", totalGastos);
localStorage.setItem("movimientos", JSON.stringify(movimientos));

}

function cargarDatos(){

let prod = localStorage.getItem("totalProducido");
let gast = localStorage.getItem("totalGastos");
let mov = localStorage.getItem("movimientos");

if(prod) totalProducido = Number(prod);
if(gast) totalGastos = Number(gast);
if(mov) movimientos = JSON.parse(mov);

mostrarMovimientos();
actualizar();

}

function agregarProducido(){

let input = document.getElementById("valor");
let valor = Number(input.value);
let mes = document.getElementById("mes").value;

if(valor<=0) return;

totalProducido += valor;

movimientos.push({
tipo:"Producido",
valor:valor,
mes:mes
});

guardarDatos();

mostrarMovimientos();
actualizar();

input.value = "";

}

function agregarGasto(){

let input = document.getElementById("valor");
let valor = Number(input.value);
let mes = document.getElementById("mes").value;

if(valor<=0) return;

totalGastos += valor;

movimientos.push({
tipo:"Gasto",
valor:valor,
mes:mes
});

guardarDatos();

mostrarMovimientos();
actualizar();

input.value = "";

}

function mostrarMovimientos(){

let lista = document.getElementById("movimientos");

lista.innerHTML = "";

movimientos.forEach(m => {

let item = document.createElement("p");

item.innerText = m.mes+" - "+m.tipo+": $"+formatearNumero(m.valor);

lista.appendChild(item);

});

}

function actualizar(){

document.getElementById("totalProducido").innerText = formatearNumero(totalProducido);

document.getElementById("totalGastos").innerText = formatearNumero(totalGastos);

document.getElementById("totalFinal").innerText = formatearNumero(totalProducido - totalGastos);

}

cargarDatos();

</script>

</body>
</html>
