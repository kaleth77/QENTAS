<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Dinero</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:500px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
text-align:center;
}

h1{
margin-bottom:20px;
}

select, input, button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#e0e0e0;
cursor:pointer;
}

button:hover{
background:#d0d0d0;
}

hr{
margin:20px 0;
}

.movimientos{
text-align:left;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Control de Dinero</h1>

<select id="mes">
<option>Enero</option>
<option>Febrero</option>
<option>Marzo</option>
<option>Abril</option>
<option>Mayo</option>
<option>Junio</option>
<option>Julio</option>
<option>Agosto</option>
<option>Septiembre</option>
<option>Octubre</option>
<option>Noviembre</option>
<option>Diciembre</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="agregarProducido()">Agregar Producido</button>
<button onclick="agregarGasto()">Agregar Gasto</button>

<hr>

<h3>Total producido: $<span id="totalProducido">0</span></h3>
<h3>Total gastos: $<span id="totalGastos">0</span></h3>
<h2>Total final: $<span id="totalFinal">0</span></h2>

<hr>

<h3>Movimientos</h3>

<div id="movimientos" class="movimientos"></div>

</div>

<script>

let totalProducido = 0;
let totalGastos = 0;

function formatearNumero(num){
return num.toLocaleString('es-CO');
}

function agregarProducido(){

let valor = Number(document.getElementById("valor").value);
let mes = document.getElementById("mes").value;

if(valor<=0)return;

totalProducido += valor;

agregarMovimiento("Producido",valor,mes);

actualizar();

}

function agregarGasto(){

let valor = Number(document.getElementById("valor").value);
let mes = document.getElementById("mes").value;

if(valor<=0)return;

totalGastos += valor;

agregarMovimiento("Gasto",valor,mes);

actualizar();

}

function agregarMovimiento(tipo,valor,mes){

let lista = document.getElementById("movimientos");

let item = document.createElement("p");

item.innerText = mes+" - "+tipo+": $"+formatearNumero(valor);

lista.appendChild(item);

}

function actualizar(){

document.getElementById("totalProducido").innerText = formatearNumero(totalProducido);

document.getElementById("totalGastos").innerText = formatearNumero(totalGastos);

document.getElementById("totalFinal").innerText = formatearNumero(totalProducido - totalGastos);

}

</script>

</body>
</html>
