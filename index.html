<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Dinero</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:500px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
text-align:center;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#e0e0e0;
cursor:pointer;
}

button:hover{
background:#d0d0d0;
}

.movimientos{
text-align:left;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Control de Dinero</h2>

<input type="date" id="fecha">

<h3 id="fechaTexto"></h3>

<input id="valor" type="number" placeholder="Valor">

<button onclick="agregarProducido()">Agregar Producido</button>
<button onclick="agregarGasto()">Agregar Gasto</button>

<hr>

<h3>Total producido: $<span id="totalProducido">0</span></h3>
<h3>Total gastos: $<span id="totalGastos">0</span></h3>
<h2>Total final: $<span id="totalFinal">0</span></h2>

<hr>

<h3>Movimientos</h3>

<div id="movimientos" class="movimientos"></div>

</div>

<script>

let totalProducido = 0;
let totalGastos = 0;
let movimientos = [];

const meses = [
"Enero","Febrero","Marzo","Abril","Mayo","Junio",
"Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
];

function obtenerClave(){
let fecha = document.getElementById("fecha").value;
return fecha;
}

function mostrarFechaBonita(){
let fecha = document.getElementById("fecha").value;

if(!fecha) return;

let partes = fecha.split("-");
let año = partes[0];
let mes = meses[Number(partes[1]) - 1];
let dia = partes[2];

document.getElementById("fechaTexto").innerText = dia + " de " + mes + " " + año;
}

function formatearNumero(num){
return num.toLocaleString('es-CO');
}

function guardarDatos(){

let clave = obtenerClave();

localStorage.setItem("prod-"+clave, totalProducido);
localStorage.setItem("gast-"+clave, totalGastos);
localStorage.setItem("mov-"+clave, JSON.stringify(movimientos));

}

function cargarDatos(){

let clave = obtenerClave();

let prod = localStorage.getItem("prod-"+clave);
let gast = localStorage.getItem("gast-"+clave);
let mov = localStorage.getItem("mov-"+clave);

totalProducido = prod ? Number(prod) : 0;
totalGastos = gast ? Number(gast) : 0;
movimientos = mov ? JSON.parse(mov) : [];

mostrarMovimientos();
actualizar();

}

function agregarProducido(){

let valor = Number(document.getElementById("valor").value);
if(valor<=0) return;

totalProducido += valor;

movimientos.push({
tipo:"Producido",
valor:valor,
fecha:obtenerClave()
});

guardarDatos();
mostrarMovimientos();
actualizar();

document.getElementById("valor").value = "";

}

function agregarGasto(){

let valor = Number(document.getElementById("valor").value);
if(valor<=0) return;

totalGastos += valor;

movimientos.push({
tipo:"Gasto",
valor:valor,
fecha:obtenerClave()
});

guardarDatos();
mostrarMovimientos();
actualizar();

document.getElementById("valor").value = "";

}

function mostrarMovimientos(){

let lista = document.getElementById("movimientos");
lista.innerHTML = "";

movimientos.forEach(m => {
let item = document.createElement("p");
item.innerText = m.tipo + ": $" + formatearNumero(m.valor);
lista.appendChild(item);
});

}

function actualizar(){

document.getElementById("totalProducido").innerText = formatearNumero(totalProducido);
document.getElementById("totalGastos").innerText = formatearNumero(totalGastos);
document.getElementById("totalFinal").innerText = formatearNumero(totalProducido - totalGastos);

}

// 🔥 cambiar fecha
document.getElementById("fecha").addEventListener("change", () => {
mostrarFechaBonita();
cargarDatos();
});

// 🔥 cargar hoy automático
window.onload = () => {

let hoy = new Date();

// 🔥 forma segura
let fechaHoy = hoy.toISOString().split("T")[0];

document.getElementById("fecha").value = fechaHoy;

mostrarFechaBonita();
cargarDatos();

};

</script>

</body>
</html>
