<!DOCTYPE html>
<html>
<head>
<title>Control de Dinero</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
width:400px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input,select{
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
margin:5px;
cursor:pointer;
}

.lista{
margin-top:15px;
text-align:left;
}

.item{
display:flex;
justify-content:space-between;
background:#f7f7f7;
padding:5px;
margin:3px 0;
border-radius:5px;
}

.producido{
color:green;
}

.gasto{
color:red;
}

</style>
</head>

<body>

<div class="container">

<h2>Control de Dinero</h2>

<select id="mes">
<option>Enero</option>
<option>Febrero</option>
<option>Marzo</option>
<option>Abril</option>
<option>Mayo</option>
<option>Junio</option>
<option>Julio</option>
<option>Agosto</option>
<option>Septiembre</option>
<option>Octubre</option>
<option>Noviembre</option>
<option>Diciembre</option>
</select>

<br>

<input type="number" id="valor" placeholder="Valor">

<button onclick="agregarProducido()">Agregar Producido</button>
<button onclick="agregarGasto()">Agregar Gasto</button>

<hr>

<h3>Total producido: $<span id="totalProducido">0</span></h3>
<h3>Total gastos: $<span id="totalGastos">0</span></h3>
<h2>Total final: $<span id="totalFinal">0</span></h2>

<hr>

<h3>Movimientos</h3>

<div id="lista" class="lista"></div>

</div>

<script>

let movimientos = []

function formatear(num){
return num.toLocaleString('es-CO')
}

function agregarProducido(){

let valor = Number(document.getElementById("valor").value)
let mes = document.getElementById("mes").value

movimientos.push({
tipo:"producido",
valor:valor,
mes:mes
})

mostrar()

}

function agregarGasto(){

let valor = Number(document.getElementById("valor").value)
let mes = document.getElementById("mes").value

movimientos.push({
tipo:"gasto",
valor:valor,
mes:mes
})

mostrar()

}

function eliminar(i){
movimientos.splice(i,1)
mostrar()
}

function mostrar(){

let lista = document.getElementById("lista")
lista.innerHTML=""

let totalProducido=0
let totalGastos=0

movimientos.forEach((m,i)=>{

let div=document.createElement("div")
div.className="item"

if(m.tipo=="producido"){
totalProducido+=m.valor
}

if(m.tipo=="gasto"){
totalGastos+=m.valor
}

div.innerHTML=

m.mes+" - "+m.tipo+" $"+formatear(m.valor)+
" <button onclick='eliminar("+i+")'>X</button>"

lista.appendChild(div)

})

document.getElementById("totalProducido").innerText=formatear(totalProducido)
document.getElementById("totalGastos").innerText=formatear(totalGastos)
document.getElementById("totalFinal").innerText=formatear(totalProducido-totalGastos)

}

</script>

</body>
</html>
